<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hyperspeed</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="icon" type="image/x-icon" href="img/favicon.png"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<link rel="stylesheet" href="css/style.css"/>
  <meta property="og:image" content="https://cdn.discordapp.com/attachments/1447166873199317114/1494943339181641889/togif.gif?ex=69e471fa&is=69e3207a&hm=93528fad91c1896b7e5df9c54aa1a8317e781a0eb9db1090777ae3de9274d070&" />
  <meta property="og:type" content="website" />
  <meta property="og:description" content="The fastest proxy ever made." />
  <script src="https://braverybreezebinding.com/d4/1a/d1/d41ad1c9ef1facb44fe31b8f0d6f47e5.js"></script>
</head>
<body>
<div class="bg"></div>
<div class="bg-overlay"></div>
<div class="chrome-overlay"></div>

<div class="browser" id="browser">
  <aside class="sidebar">
    <div class="logo-btn" onclick="nav(activeTabId,'hyperspeed://newtab')" title="Home">
      <img src="img/favicon.png" alt="HS"/>
    </div>
    <div class="sidebar-space"></div>
    <button class="nav-btn active" id="btn-newtab" onclick="nav(activeTabId,'hyperspeed://newtab')"><i class="fa-solid fa-house"></i><span class="nav-tip">home</span></button>
    <button class="nav-btn" id="btn-games" onclick="nav(activeTabId,'hyperspeed://games')"><i class="fa-solid fa-gamepad"></i><span class="nav-tip">games</span></button>
    <button class="nav-btn" id="btn-movies" onclick="nav(activeTabId,'hyperspeed://movies')"><i class="fa-solid fa-film"></i><span class="nav-tip">movies</span></button>
    <button class="nav-btn" id="btn-ai" onclick="nav(activeTabId,'hyperspeed://ai')"><i class="fa-solid fa-robot"></i><span class="nav-tip">ai</span></button>
    <div class="sidebar-div"></div>
    <button class="nav-btn" id="btn-bm" onclick="toggleBmBar()"><i class="fa-solid fa-bookmark"></i><span class="nav-tip">bookmarks</span></button>
    <button class="nav-btn" id="btn-history" onclick="nav(activeTabId,'hyperspeed://history')"><i class="fa-solid fa-clock-rotate-left"></i><span class="nav-tip">history</span></button>
    <div class="sidebar-space"></div>
    <button class="nav-btn" id="btn-about" onclick="nav(activeTabId,'hyperspeed://about')"><i class="fa-solid fa-circle-info"></i><span class="nav-tip">about</span></button>
    <div style="height:8px"></div>
    <button class="acct-btn guest" id="acct-btn" onclick="openModal()"><i class="fa-solid fa-user" id="acct-icon"></i><span class="nav-tip" id="acct-tip">sign in</span></button>
  </aside>

  <div class="tab-bar" id="tab-bar">
    <div class="tab-overflow" id="tab-overflow"><i class="fa-solid fa-chevron-right"></i> <span id="overflow-count">0</span></div>
  </div>

  <header class="chrome">
    <button class="chr-btn" id="btn-back" onclick="goBack()" disabled><i class="fa-solid fa-chevron-left"></i></button>
    <button class="chr-btn" id="btn-fwd" onclick="goFwd()" disabled><i class="fa-solid fa-chevron-right"></i></button>
    <button class="chr-btn" onclick="reload()"><i class="fa-solid fa-rotate-right"></i></button>
    <button class="chr-btn" onclick="nav(activeTabId,'hyperspeed://newtab')"><i class="fa-solid fa-house"></i></button>
    <div class="url-wrap">
      <input class="url-bar" id="url-bar" type="text" placeholder="search or enter a url…" spellcheck="false" autocomplete="off" onkeydown="urlKey(event)" onfocus="this.select()"/>
      <i class="url-lock" id="url-lock"></i>
    </div>
    <button class="bm-star" id="bm-star" onclick="toggleBm()" title="Bookmark (Ctrl+D)"><i class="fa-solid fa-star"></i></button>
    <div class="pills">
      <div class="pill"><div class="dot spin" id="sw-dot"></div><span id="sw-lbl">init</span></div>
      <div class="pill load-pill" id="load-pill">--</div>
    </div>
  </header>

  <div class="bm-bar" id="bm-bar"></div>

  <main class="viewport" id="viewport">
  </main>
</div>

<div class="ctx" id="ctx"></div>
<div class="toasts" id="toasts"></div>
<div class="find-bar" id="find-bar">
  <input class="find-input" id="find-input" type="text" placeholder="find in page…" spellcheck="false" autocomplete="off"/>
  <span class="find-count" id="find-count">0 / 0</span>
  <div class="find-sep"></div>
  <button class="find-btn" onclick="findPrev()" title="Previous (Shift+Enter)"><i class="fa-solid fa-chevron-up"></i></button>
  <button class="find-btn" onclick="findNext()" title="Next (Enter)"><i class="fa-solid fa-chevron-down"></i></button>
  <div class="find-sep"></div>
  <button class="find-btn" onclick="closeFind()" title="Close (Esc)"><i class="fa-solid fa-xmark"></i></button>
</div>

<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <button class="modal-x" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
    <div id="p-guest">
      <h2><span class="h">HYPER</span><span class="s">SPEED</span></h2>
      <div class="modal-sub">sync bookmarks &nbsp;·&nbsp; history &nbsp;·&nbsp; everywhere</div>
      <div class="mtabs">
        <button class="mtab on" id="t-si" onclick="authTab('si')">sign in</button>
        <button class="mtab" id="t-reg" onclick="authTab('reg')">register</button>
      </div>
      <div id="f-si">
        <div class="mfield"><label class="mlabel">email</label><input class="minput" id="si-email" type="email" placeholder="you@example.com" autocomplete="email"/></div>
        <div class="mfield"><label class="mlabel">password</label><input class="minput" id="si-pw" type="password" placeholder="••••••••" autocomplete="current-password"/></div>
        <button class="mbtn" id="si-btn" onclick="doSignIn()">sign in</button>
        <div class="merr" id="si-err"></div>
      </div>
      <div id="f-reg" style="display:none">
        <div class="mfield"><label class="mlabel">display name</label><input class="minput" id="reg-name" type="text" placeholder="your name" autocomplete="name"/></div>
        <div class="mfield"><label class="mlabel">email</label><input class="minput" id="reg-email" type="email" placeholder="you@example.com" autocomplete="email"/></div>
        <div class="mfield"><label class="mlabel">password</label><input class="minput" id="reg-pw" type="password" placeholder="min 6 characters" autocomplete="new-password"/></div>
        <button class="mbtn" id="reg-btn" onclick="doRegister()">create account</button>
        <div class="merr" id="reg-err"></div>
      </div>
    </div>
    <div id="p-user" style="display:none">
      <div class="avrow"><div class="avbig" id="u-av">?</div><div><div class="uname" id="u-name">—</div><div class="uemail" id="u-email">—</div></div></div>
      <div class="mdiv"></div>
      <div class="sync-row"><span>Bookmarks</span><span class="ss" id="ss-bm">synced</span></div>
      <div class="sync-row"><span>History</span><span class="ss" id="ss-hi">synced</span></div>
      <div class="sync-row"><span>Bookmarks Bar</span><button class="bm-toggle-btn" id="bm-toggle-btn" onclick="toggleBmBarModal()"><i class="fa-solid fa-bookmark" id="bm-toggle-icon"></i> <span id="bm-toggle-lbl">show</span></button></div>
      <div class="mdiv"></div>
      <div class="mfield"><label class="mlabel">change display name</label><div style="display:flex;gap:8px"><input class="minput" id="new-name" type="text" placeholder="new name" style="flex:1"/><button class="mbtn-sm" onclick="updateName()">save</button></div></div>
      <div class="mfield"><label class="mlabel">change password</label><div style="display:flex;gap:8px"><input class="minput" id="new-pw" type="password" placeholder="new password" style="flex:1"/><button class="mbtn-sm" onclick="updatePw()">save</button></div></div>
      <div class="merr" id="u-err"></div>
      <button class="mbtn-out" onclick="doSignOut()"><i class="fa-solid fa-arrow-right-from-bracket" style="margin-right:8px"></i>sign out</button>
    </div>
  </div>
</div>

<script src="js/main.js"></script>
<script type="module" src="js/fb.js"></script>
</body>
</html>
