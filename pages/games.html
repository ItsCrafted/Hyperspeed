<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<link rel="stylesheet" href="../css/games.css"/>
</head>
<body>

<div class="bg"></div>

<div class="float-ui">
  <div class="bar">
    <div class="search-wrap">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input type="text" id="search" placeholder="search games…" autocomplete="off" spellcheck="false"/>
    </div>
    <span class="count-badge" id="count"></span>
  </div>
  <div class="tags-row" id="tags-bar"></div>
</div>

<div class="scroll">
  <div class="grid" id="grid">
    <div class="empty" id="empty">
      <i class="fa-solid fa-magnifying-glass"></i>
      <span>no games found</span>
    </div>
  </div>
</div>

<div class="player-backdrop" id="player-backdrop" onclick="closePlayer()"></div>

<div class="player" id="player">
  <div class="player-bar">
    <div class="player-dot"></div>
    <span class="player-title" id="player-title"></span>
    <button class="player-btn" id="fs-btn" title="Fullscreen" onclick="toggleFullscreen()">
      <i class="fa-solid fa-expand" id="fs-icon"></i>
    </button>
    <button class="player-btn danger" title="Close (Esc)" onclick="closePlayer()">
      <i class="fa-solid fa-xmark"></i>
    </button>
  </div>
  <iframe id="player-frame" allowfullscreen allow="fullscreen *"></iframe>
</div>
<script src="../js/games.js"></script>
</body>
</html>
