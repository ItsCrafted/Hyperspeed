<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Syne:wght@400;500;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<link rel="stylesheet" href="../css/movies.css"/>
</head>
<body>

<div class="bg-canvas"></div>

<div class="float-ui">
  <div class="bar">
    <div class="bar-logo"><div class="bar-logo-dot"></div>Movies</div>
    <div class="search-wrap">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input type="text" id="game-search" placeholder="search movies…" autocomplete="off" spellcheck="false"/>
    </div>
    <span class="count-badge" id="count-badge"></span>
  </div>
  <div class="tags-row" id="tags-bar"></div>
</div>

<div class="scroll">
  <div id="games-container"></div>
  <div id="no-results">No movies found matching your search.</div>
  <div class="load-more-wrap">
    <button id="load-more-btn">Load More Movies</button>
  </div>
</div>

<div class="player-backdrop" id="player-backdrop" onclick="closePlayer()"></div>
<div class="player" id="player">
  <div class="player-bar">
    <div class="player-dot"></div>
    <span class="player-title" id="player-title"></span>
    <button class="player-btn" title="Fullscreen" onclick="toggleFullscreen()">
      <i class="fa-solid fa-expand" id="fs-icon"></i>
    </button>
    <button class="player-btn danger" title="Close (Esc)" onclick="closePlayer()">
      <i class="fa-solid fa-xmark"></i>
    </button>
  </div>
  <div class="player-video-wrap">
    <iframe id="player-frame" allowfullscreen allow="fullscreen *"></iframe>
  </div>
</div>
<script src="../js/movies.js"></script>
</body>
</html>
